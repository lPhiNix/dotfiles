# ------------------------------------------------------------------------
# Matugen configuration for dynamic themes
# by lPhiNix

[config]

[templates.waybar]
input_path = "~/.config/matugen/templates/color-palette.css"
output_path = "~/.config/waybar/colors.css"
post_hook = '~/.config/waybar/launch.sh'

[templates.ohmyposh]
input_path = '~/.config/matugen/templates/ohmyposh-colors.json'
output_path = '~/.config/ohmyposh/promt.omp.json'

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/colors.conf"
post_hook = 'pkill -SIGUSR1 kitty'