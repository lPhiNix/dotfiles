# ------------------------------------------------------------------------
# Matugen configuration for dynamic themes
# by lPhiNix

[config]
fallback_color = "#000000"

[config.wallpaper]
command = "awww"
arguments = ["img", "--transition-type", "any", "--transition-fps", "60"]
set = true

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-palette.lua'
output_path = '~/.config/hypr/colors.lua'
post_hook = 'hyprctl reload'

[templates.waybar]
input_path = "~/.config/matugen/templates/waybar-palette.css"
output_path = "~/.config/waybar/colors.css"
post_hook = '~/.config/waybar/launch.sh'

[templates.ohmyposh]
input_path = '~/.config/matugen/templates/ohmyposh-theme.jsonc'
output_path = '~/.config/ohmyposh/promt.omp.jsonc'

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-palette.conf"
output_path = "~/.config/kitty/colors.conf"
post_hook = 'pkill -SIGUSR1 kitty'

[templates.rofi]
input_path = '~/.config/matugen/templates/rofi-palette.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.wlogout]
input_path = '~/.config/matugen/templates/wlogout-palette.css'
output_path = '~/.config/wlogout/colors.css'
post_hook = 'pkill -USR1 wlogout || true'

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-palette.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = "gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3-dark' && gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'"

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-palette.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.qt]
input_path = '~/.config/matugen/templates/qt-palette.conf'
output_path = '~/.config/qt6ct/colors.conf'

[templates.shell]
input_path = '~/.config/matugen/templates/gum-palette.sh'
output_path = '~/.config/scripts/shell-colors.sh'

[templates.btop]
input_path = '~/.config/matugen/templates/btop.theme'
output_path = '~/.config/btop/themes/btop.theme'

[templates.cava]
input_path = '~/.config/matugen/templates/cava-palette.theme'
output_path = '~/.config/cava/themes/matugen'
post_hook = 'pkill -USR1 cava'